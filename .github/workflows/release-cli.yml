name: Release CLI binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed tag to release
        required: true

permissions:
  contents: write

jobs:
  build-unix:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Linux ARM linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --locked --release --manifest-path apps/cli/Cargo.toml --target ${{ matrix.target }}

      - name: Package release archive
        run: |
          mkdir -p release
          cp apps/cli/target/${{ matrix.target }}/release/aistack release/aistack
          tar -czf aistack-${{ matrix.target }}.tar.gz -C release aistack

      - uses: actions/upload-artifact@v4
        with:
          name: aistack-${{ matrix.target }}
          path: aistack-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build x86_64-pc-windows-msvc
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Build release binary
        run: cargo build --locked --release --manifest-path apps/cli/Cargo.toml --target x86_64-pc-windows-msvc

      - name: Package release archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item apps/cli/target/x86_64-pc-windows-msvc/release/aistack.exe release/aistack.exe
          tar -czf aistack-x86_64-pc-windows-msvc.tar.gz -C release aistack.exe

      - uses: actions/upload-artifact@v4
        with:
          name: aistack-x86_64-pc-windows-msvc
          path: aistack-x86_64-pc-windows-msvc.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: [build-unix, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Validate tag matches npm package version
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          PACKAGE_VERSION="$(node -p "require('./apps/cli/npm/package.json').version")"
          test "$RELEASE_TAG" = "v$PACKAGE_VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: gh release create "$RELEASE_TAG" dist/* --generate-notes --verify-tag
